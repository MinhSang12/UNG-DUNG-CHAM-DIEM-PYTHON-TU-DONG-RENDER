<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết quả Chấm điểm - DSA AutoGrader</title>
    <link rel="icon" href="https://www.python.org/static/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4361ee;
            --secondary-color: #3f37c9;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
        }

        body {
            background-color: #f0f2f5;
            font-family: "Segoe UI", "Roboto", "Helvetica Neue", Arial, sans-serif;
            color: #333;
        }

        .header-result {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(63, 55, 201, 0.2);
        }

        .card {
            border: none;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 1.5rem;
            background: white;
        }

        /* Summary Cards */
        #summary-section .card {
            border-left: 5px solid var(--primary-color);
            transition: transform 0.2s;
        }

        #summary-section .card:hover {
            transform: translateY(-3px);
        }

        /* Score Circle */
        .score-display {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #f8fafc;
            margin-bottom: 1rem;
        }

        .score-value {
            font-size: 2rem;
            font-weight: 800;
            line-height: 1;
        }

        .score-pass {
            color: var(--success-color);
            border: 4px solid var(--success-color);
        }

        .score-fail {
            color: var(--danger-color);
            border: 4px solid var(--danger-color);
        }

        .progress {
            height: 1.2rem;
            border-radius: 1rem;
            background-color: #e2e8f0;
            margin-top: 0.5rem;
        }

        .notes-box {
            background-color: #f8fafc;
            border-left: 4px solid var(--warning-color);
            border-radius: 0.5rem;
            padding: 1rem;
        }

        .badge-algo {
            background-color: #e0e7ff;
            color: #4361ee;
            font-weight: 600;
            padding: 0.4em 0.8em;
            border-radius: 2rem;
            font-size: 0.9rem;
        }

        /* Ẩn nút khi in */
        @media print {
            .no-print {
                display: none !important;
            }
        }
    </style>
</head>

<body>
    <header class="header-result">
        <div class="container">
            <h1 class="fw-bold"><i class="fa-solid fa-clipboard-check me-2"></i>Kết quả Chấm điểm</h1>
            <div class="d-flex gap-2 mt-3 no-print">
                <a href="/" class="btn btn-light"><i class="fa-solid fa-arrow-left me-2"></i>Chấm bài khác</a>
                <button onclick="window.print()" class="btn btn-outline-light"><i class="fa-solid fa-print me-2"></i>In
                    kết quả</button>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Summary Section -->
        <div class="row mb-4" id="summary-section">
            <!-- Will be filled by JS -->
        </div>

        <!-- Detailed Results -->
        <div id="results-container">
            <!-- Will be filled by JS -->
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const rawData = sessionStorage.getItem('gradingResults');
            if (!rawData) {
                document.getElementById('results-container').innerHTML = `
                    <div class="alert alert-warning text-center">
                        <h4>Không tìm thấy dữ liệu kết quả!</h4>
                        <p>Vui lòng quay lại trang chủ và nộp bài.</p>
                        <a href="/" class="btn btn-primary">Quay lại</a>
                    </div>`;
                return;
            }

            const data = JSON.parse(rawData);
            renderSummary(data.summary);
            renderResults(data.results);
        });

        function renderSummary(summary) {
            const container = document.getElementById('summary-section');
            if (!summary) return;

            container.innerHTML = `
                <div class="col-md-4">
                    <div class="card text-center p-3">
                        <h3 class="text-primary fw-bold">${summary.total_files}</h3>
                        <span class="text-muted small text-uppercase fw-bold">Tổng số file</span>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card text-center p-3">
                        <h3 class="text-primary fw-bold">${summary.avg_score}</h3>
                        <span class="text-muted small text-uppercase fw-bold">Điểm trung bình</span>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card text-center p-3">
                        <h3 class="text-info fw-bold">${summary.total_time}</h3>
                        <span class="text-muted small text-uppercase fw-bold">Thời gian xử lý</span>
                    </div>
                </div>
            `;
        }

        // results.html - Thay thế hàm renderResults để lấy tiêu chí động
        function renderResults(results) {
            const container = document.getElementById('results-container');
            if (!results || results.length === 0) {
                container.innerHTML = '<div class="alert alert-info">Không có kết quả nào.</div>';
                return;
            }

            results.forEach(r => {
                const isPass = r.status === 'AC';

                // BƯỚC QUAN TRỌNG: Lấy danh sách tiêu chí động từ mảng criteria_results
                let criteriaHtml = "";
                let feedbackDetails = "";

                if (r.criteria_results && r.criteria_results.length > 0) {
                    r.criteria_results.forEach(item => {
                        // 1. Phần Badge điểm bên phải
                        criteriaHtml += `
                    <div class="d-flex justify-content-between align-items-center mb-2 border-bottom pb-1">
                        <span class="small text-dark fw-medium" style="max-width: 85%;">${item.criterion}</span>
                        <span class="badge bg-primary rounded-pill shadow-sm" style="min-width: 45px;">${item.score}đ</span>
                    </div>`;

                        // 2. Phần Nhận xét chi tiết bên dưới mỗi tiêu chí
                        feedbackDetails += `
                    <div class="mb-3">
                        <div class="fw-bold text-primary small"><i class="fas fa-check-circle me-1"></i> ${item.criterion}</div>
                        <div class="ps-3 text-muted small" style="line-height: 1.4;">${item.reason}</div>
                    </div>`;
                    });
                }

                const card = document.createElement('div');
                card.className = 'card mb-4 overflow-hidden';
                card.innerHTML = `
            <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                <h5 class="mb-0 fw-bold text-truncate" style="max-width: 70%;">
                    <i class="fa-brands fa-python text-primary me-2"></i>${r.filename.split(' | ').pop()}
                </h5>
                <span class="badge ${isPass ? 'bg-success' : 'bg-danger'} px-3 rounded-pill">${r.status}</span>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-3 text-center border-end">
                        <div class="score-display ${isPass ? 'score-pass' : 'score-fail'} mb-2">
                            <span class="score-value">${r.total_score}</span>
                        </div>
                        <div class="badge-algo mb-2">${r.algorithms || 'Cơ bản'}</div>
                        <div class="small text-muted"><i class="fa-regular fa-clock me-1"></i>${r.runtime || 'N/A'}</div>
                    </div>
                    
                    <div class="col-md-9 ps-md-4">
                        <h6 class="fw-bold text-uppercase text-muted small mb-3">Điểm thành phần (Dynamic Rubric)</h6>
                        <div class="mb-4">${criteriaHtml}</div>
                        
                        <div class="notes-box">
                            <h6 class="fw-bold text-dark small mb-2">Phân tích chi tiết từ AI:</h6>
                            ${feedbackDetails}
                            <hr>
                            <div class="fst-italic text-secondary small">
                                <strong>Tổng kết:</strong> ${r.notes[0] || "Đã hoàn thành chấm điểm."}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;
                container.appendChild(card);
            });
        }
    </script>
</body>

</html>
