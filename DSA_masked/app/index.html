<!DOCTYPE html>
<html>
<head>
    <title>DSA AutoGrader</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg-body: #f6f8fa; --border-color: #d0d7de; --text-primary: #24292f; --header-bg: #24292f; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-body); color: var(--text-primary); font-size: 0.9rem; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .app-navbar { background: var(--header-bg); padding: 0.8rem 0; border-bottom: 1px solid var(--border-color); }
        .brand-title { color: white; font-weight: 600; font-size: 1.1rem; letter-spacing: -0.5px; }
        .nav-link-custom { color: #d0d7de; text-decoration: none; font-size: 0.85rem; font-weight: 500; margin-left: 1.5rem; transition: color 0.2s; }
        .nav-link-custom:hover { color: white; }

        .app-card { border: 1px solid var(--border-color); border-radius: 6px; background: white; box-shadow: none; }
        .card-header-custom { background: #f6f8fa; border-bottom: 1px solid var(--border-color); padding: 1rem 1.5rem; border-radius: 6px 6px 0 0; }
        
        .btn-primary { background-color: #1f883d; border-color: rgba(27,31,35,0.15); font-weight: 600; }
        .btn-primary:hover { background-color: #1a7f37; }
        
        .results-table th { font-weight: 600; font-size: 0.8rem; color: #57606a; background: #f6f8fa; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; }
        .results-table td { vertical-align: middle; border-bottom: 1px solid var(--border-color); font-family: 'Inter', sans-serif; }
        .filename-cell { font-family: 'JetBrains Mono', monospace; color: #0969da; font-weight: 500; }
        
        .status-badge { font-size: 0.75rem; font-weight: 600; padding: 2px 8px; border-radius: 2em; border: 1px solid transparent; }
        .status-ac { background-color: #dafbe1; color: #1a7f37; border-color: rgba(26,127,55,0.2); }
        .status-wa { background-color: #ffebe9; color: #cf222e; border-color: rgba(207,34,46,0.2); }
        .status-flag { background-color: #fff8c5; color: #9a6700; border-color: rgba(154,103,0,0.2); }
        
        .table-wrapper { max-height: 600px; overflow-y: auto; border: 1px solid var(--border-color); border-radius: 6px; }
    </style>
</head>
<body>
        <nav class="app-navbar navbar navbar-expand-lg">
            <div class="container">
                <a class="text-decoration-none d-flex align-items-center" href="/">
                    <span class="brand-title mono">DSA_AutoGrader</span>
                </a>
                <div class="ms-auto d-flex align-items-center">
                    <button class="btn btn-link nav-link-custom p-0 border-0" onclick="loadHistory()">
                        Lịch sử
                    </button>
                    <a href="/download-csv" class="nav-link-custom">
                        Xuất CSV
                    </a>
                </div>
            </div>
        </nav>
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card app-card mb-4">
                <div class="card-header-custom">
                    <div class="d-flex justify-content-between align-items-center">
                        <h6 class="fw-bold mb-0">Nộp bài chấm</h6>
                        <div class="small text-muted mono">Supported: .py, .zip, .rar</div>
                    </div>
                </div>
                <div class="card-body p-4">
                    <form id="lightningForm">
                        <div class="mb-3">
                            <input class="form-control" name="files" type="file" accept=".py,.zip,.rar" multiple required style="font-size: 0.9rem;">
                        </div>
                        <button class="btn btn-primary w-100 py-2" type="submit">Bắt đầu chấm</button>
                    </form>
                </div>
            </div>
            
            <!-- Modal Lịch sử -->
            <div class="modal fade" id="historyModal" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog modal-lg">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title fw-bold">Lịch sử chấm điểm</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body p-0">
                            <div class="table-responsive" style="max-height: 60vh; overflow-y: auto;">
                                <table class="table table-hover mb-0 results-table">
                                    <thead>
                                        <tr><th>Time</th><th>File</th><th>Score</th><th>Algorithm</th><th>Status</th></tr>
                                    </thead>
                                    <tbody id="historyTableBody"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Modal Chi tiết: Bằng chứng chấm điểm -->
            <div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog modal-lg">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title fw-bold">Kết quả chi tiết</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body" id="modalBody"></div>
                    </div>
                </div>
            </div>

            <div id="results" style="display:none;">
                <div class="card app-card border-0">
                    <div class="card-header-custom d-flex justify-content-between align-items-center">
                        <h6 class="fw-bold mb-0">Danh sách kết quả</h6>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive table-wrapper border-0 rounded-bottom">
                            <table class="table table-hover mb-0 results-table">
                                <thead>
                                <tr>
                                    <th class="ps-4">File Name</th>
                                    <th>Score</th>
                                    <th>PEP8</th>
                                    <th>DSA</th>
                                    <th>Algorithm Detected</th>
                                    <th>Status</th>
                                    <th>Time</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="resultsTable" class="border-top-0"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let lastResults = []; // Lưu kết quả để hiển thị modal

document.getElementById('lightningForm').onsubmit = async e => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const resultsDiv = document.getElementById('results');
    const tableBody = document.getElementById('resultsTable');
    
    resultsDiv.style.display = 'block';
    tableBody.innerHTML = ` 
        <tr><td colspan="7" class="text-center p-5">
            <div class="spinner-border text-secondary mb-3" role="status"></div>
            <div class="text-muted">Đang xử lý...</div>
        </td></tr>`;
    
    try {
        const res = await fetch('/grade', {method: 'POST', body: formData});
        const data = await res.json();
        lastResults = data.results;
        
        let rows = '';
        data.results.forEach((r, index) => {
            const statusClass = r.status === 'AC' ? 'status-ac' : (r.status === 'FLAG' ? 'status-flag' : 'status-wa');
            rows += `
                <tr>
                    <td class="ps-4">
                        <div class="filename-cell">${r.filename}</div>
                        ${r.notes.length ? `<div class="small text-muted mt-1" style="font-size:0.75rem">${r.notes.length} vấn đề</div>` : ''}
                    </td>
                    <td><span class="fw-bold ${r.total_score >= 50 ? 'text-success' : 'text-danger'} mono">${r.total_score}</span></td>
                    <td class="text-secondary">${r.breakdown.pep8}</td>
                    <td class="text-secondary">${r.breakdown.dsa}</td>
                    <td><div class="d-flex flex-wrap gap-1" style="max-width: 300px;">${r.algorithms ? r.algorithms.split(', ').map(a => `<span class="badge bg-light text-dark border fw-normal text-secondary">${a}</span>`).join('') : '<span class="badge bg-light text-dark border fw-normal text-secondary">Cơ bản</span>'}</div></td>
                    <td><span class="status-badge ${statusClass}">${r.status}</span></td>
                    <td class="text-secondary small mono">${r.runtime}</td>
                    <td><button class="btn btn-sm btn-link text-decoration-none" onclick="showDetails(${index})">View</button></td>
                </tr>`;
        });
        
        tableBody.innerHTML = rows;
        
    } catch (error) {
        tableBody.innerHTML = `<tr><td colspan="7" class="p-5">
            <div class="alert alert-danger text-center">
                <h4>Lỗi: ${error.message}</h4>
            </div>
        </td></tr>`;
    }
}

window.showDetails = (index) => {
    const r = lastResults[index];
    const modalBody = document.getElementById('modalBody');
    
    modalBody.innerHTML = `
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0 mono text-primary">${r.filename}</h5>
            <span class="badge bg-secondary fs-6 mono">${r.total_score}/100</span>
        </div>
        
        <div class="row">
            <div class="col-md-6">
                <h6 class="fw-bold small text-uppercase text-muted">Breakdown</h6>
                <ul class="list-group list-group-flush mb-3">
                    <li class="list-group-item d-flex justify-content-between px-0"><span>PEP8 (Style):</span> <span class="mono">${r.breakdown.pep8}</span></li>
                    <li class="list-group-item d-flex justify-content-between px-0"><span>DSA (Logic):</span> <span class="mono">${r.breakdown.dsa}</span></li>
                    <li class="list-group-item d-flex justify-content-between px-0"><span>Complexity:</span> <span class="mono">${r.breakdown.complexity}</span></li>
                    <li class="list-group-item d-flex justify-content-between px-0"><span>Tests:</span> <span class="mono">${r.breakdown.tests}</span></li>
                    ${r.breakdown.ai_logic ? `<li class="list-group-item d-flex justify-content-between px-0 text-primary"><span>AI Logic:</span> <b>${r.breakdown.ai_logic}</b></li>` : ''}
                </ul>
            </div>
            <div class="col-md-6">
                <h6 class="fw-bold small text-uppercase text-muted">Technical Analysis</h6>
                <p class="mb-1"><strong>Algorithm:</strong> ${r.algorithms || 'Chưa xác định'}</p>
                <p class="mb-1"><strong>Runtime:</strong> <span class="mono">${r.runtime}</span></p>
            </div>
        </div>

        <h6 class="fw-bold mt-3 small text-uppercase text-muted">Feedback</h6>
        <div class="alert alert-${r.notes.length ? 'light border' : 'light border'}">
            ${r.notes.length ? '<ul class="mb-0 ps-3 text-danger small"><li>' + r.notes.join('</li><li>') + '</li></ul>' : '<span class="text-success small">Code sạch. Không tìm thấy lỗi nghiêm trọng.</span>'}
        </div>
    `;
    
    new bootstrap.Modal(document.getElementById('detailModal')).show();
}

window.loadHistory = async () => {
    const modal = new bootstrap.Modal(document.getElementById('historyModal'));
    modal.show();
    const tbody = document.getElementById('historyTableBody');
    tbody.innerHTML = '<tr><td colspan="5" class="text-center p-3">Đang tải dữ liệu...</td></tr>';
    
    try {
        const res = await fetch('/api/history');
        const data = await res.json();
        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center p-3 text-muted">Chưa có dữ liệu lịch sử.</td></tr>';
            return;
        }
        tbody.innerHTML = data.map(r => `
            <tr>
                <td class="small text-muted">${r['Thời gian']}</td>
                <td class="fw-bold filename-cell">${r['Tên file']}</td>
                <td class="${parseFloat(r['Điểm số']) >= 50 ? 'text-success' : 'text-danger'} fw-bold mono">${r['Điểm số']}</td>
                <td class="small">${r['Thuật toán'] || '-'}</td>
                <td><span class="status-badge ${r['Trạng thái'] === 'AC' ? 'status-ac' : (r['Trạng thái'] === 'FLAG' ? 'status-flag' : 'status-wa')}">${r['Trạng thái']}</span></td>
            </tr>
        `).join('');
    } catch (e) {
        tbody.innerHTML = `<tr><td colspan="5" class="text-danger text-center">Lỗi tải lịch sử: ${e.message}</td></tr>`;
    }
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
